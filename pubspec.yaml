name: wandb_mobile
description: A mobile client for Weights & Biases with native chart interactions.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Charts
  syncfusion_flutter_charts: ^27.2.5

  # Navigation
  go_router: ^14.6.2

  # Storage
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0

  # Code Generation (models)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.19.0
  collection: ^1.19.0
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

  # Testing
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
